{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Forgot Password
    </title>

    <link
        href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{% static 'css/forgot_password.css' %}">

</head>

<body>

<div class="forgot-wrapper">

    <div class="forgot-container">

        <!-- LEFT SIDE -->

        <div class="forgot-card">

            <div class="brand">

                <div class="brand-icon">
                    🔒
                </div>

                <div class="brand-text">

                    <h1>PayFlow</h1>

                    <p>
                        HR Payroll System
                    </p>

                </div>

            </div>

            <h2>
                Forgot Password
            </h2>

            <span>
                Enter your registered email
            </span>

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">

                    <label>
                        Email Address
                    </label>

                    <input
                        type="email"
                        placeholder="you@company.com"
                        required>

                </div>

                <button
                    type="submit">

                    Send Reset Link

                </button>

            </form>

            <a
                href="/hr/login/"
                class="back">

                ← Back to Login

            </a>

        </div>

        <!-- RIGHT SIDE -->

        <div class="forgot-image">

            <img
                src="{% static 'images/login.png' %}"
                alt="Forgot Password">

        </div>

    </div>

</div>

</body>
</html>
