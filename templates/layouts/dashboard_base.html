{% load static %}

<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1">

    <title>
        {% block title %}
            PayFlow HRMS
        {% endblock %}
    </title>

    <link
        href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{% static 'css/sidebar.css' %}">

<link rel="stylesheet"
      href="{% static 'css/navbar.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'css/dashboard.css' %}">

    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    

    {% block extra_css %}
    {% endblock %}

    </head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->

    {% include 'includes/sidebar.html' %}

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- NAVBAR -->

        {% include 'includes/navbar.html' %}

        <!-- PAGE CONTENT -->

        <section class="content">

            {% block content %}
            {% endblock %}

        </section>

    </div>

</div>

<script
    src="{% static 'js/sidebar.js' %}">
</script>

</body>
</html>
